services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      # 可选：降低内存占用（老机器更稳）
      - JVM_XMS=256m
      - JVM_XMX=256m
      - JVM_XMN=128m
    ports:
      - "8848:8848"
    # ⚠️ 用 Docker 命名卷，别再用 ./nacos_data 这种宿主机绑定卷
    volumes:
      - nacos_data:/home/nacos/data

  demo-app:
    build: ./demo-app
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=development

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

# ⬇️ 在文件底部新增（定义命名卷）
volumes:
  nacos_data:
