version: '3.8'
services:
  nacos:
    image: nacos/nacos-server:2.2.1
    environment:
      - MODE=standalone
    ports:
      - "8848:8848"
    volumes:
      - ./nacos_data:/home/nacos/data

  demo-app:
    build: ./demo-app
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=development

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
